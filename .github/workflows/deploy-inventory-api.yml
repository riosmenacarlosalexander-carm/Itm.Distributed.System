name: Deploy Inventory API to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Itm.Inventory.Api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Itm.Inventory.Api/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/itm-inventory-api:latest

    - name: Verify Deployment
      run: echo "🚀 Imagen de Inventory API desplegada exitosamente en Docker Hub!"

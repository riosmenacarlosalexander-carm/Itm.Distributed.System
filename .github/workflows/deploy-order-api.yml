name: Deploy Order API to Docker Hub# 🚀 ¿Cuándo se activa? Cuando haya un push en la rama mainon:push:branches: [ "main" ] paths:- 'Itm.Order.Api/**' # Solo se ejecuta si hay cambios en este microservicio específicojobs:build-and-push:runs-on: ubuntu-latest # GitHub nos presta una máquina Linux efímerasteps:# 1. Bajamos el código del repositorio a la máquina de GitHub- name: Checkout codeuses: actions/checkout@v4# 2. Nos logueamos en Docker Hub usando nuestros Secretos seguros- name: Login to Docker Hubuses: docker/login-action@v3with:username: ${{ secrets.DOCKER_USERNAME }}password: ${{ secrets.DOCKER_PASSWORD }}# 3. Compilamos y creamos la imagen usando el Dockerfile de la Clase 13- name: Build and push Docker imageuses: docker/build-push-action@v5with:context: .file: ./Itm.Order.Api/Dockerfilepush: true# Le ponemos la etiqueta 'latest' y el nombre de nuestro usuariotags: ${{ secrets.DOCKER_USERNAME }}/itm-order-api:latest# 4. Mensaje de éxito- name: Verify Deploymentrun: echo "🚀 Imagen desplegada exitosamente en Docker Hub!"

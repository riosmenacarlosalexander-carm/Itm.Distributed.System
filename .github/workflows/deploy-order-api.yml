name: Deploy Order API to Docker Hub# 🚀 ¿Cuándo se activa? Cuando haya un push en la rama master on:push:branches: [ "master" ] paths:- 'Itm.Order.Api/**' # Solo se ejecuta si hay cambios en este microservicio específico jobs:build-and-push:runs-on: ubuntu-latest # GitHub nos presta una máquina Linux efímera steps:# 1. Bajamos el código del repositorio a la máquina de GitHub- name: Checkout codeuses: actions/checkout@v4# 2. Nos logueamos en Docker Hub usando nuestros Secretos seguros- name: Login to Docker Hub uses: docker/login-action@v3with:username: ${{ secrets.alexriosmena }}password: ${{ secrets.riosmena0 }}# 3. Compilamos y creamos la imagen usando el Dockerfile de la Clase 13- name: Build and push Docker image uses: docker/build-push-action@v5with:context: .file: ./Itm.Order.Api/Dockerfilepush: true# Le ponemos la etiqueta 'latest' y el nombre de nuestro usuario tags: ${{ secrets.alexriosmena }}/itm-order-api:latest# 4. Mensaje de éxito- name: Verify Deploymentrun: echo "🚀 Imagen desplegada exitosamente en Docker Hub!"

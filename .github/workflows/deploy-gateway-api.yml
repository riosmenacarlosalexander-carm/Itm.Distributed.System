name: Deploy Gateway API to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Itm.Gateway.Api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Itm.Gateway.Api/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/itm-gateway-api:latest

    - name: Verify Deployment
      run: echo "🚀 Imagen del API Gateway desplegada exitosamente en Docker Hub!"
